<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Paroles de Voie Pro</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:#07131f;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
    }

    .intro{
      position:relative;
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .intro img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .enter-link{
      position:absolute;
      right:17%;
      bottom:8%;
      width:28%;
      height:9%;
      display:block;
      text-indent:-9999px;
      z-index:10;
      cursor:pointer;
    }

    @media(max-width:900px){
      .enter-link{
        right:10%;
        bottom:7%;
        width:38%;
      }
    }
  </style>
</head>

<body>
  <main class="intro">
    <img src="images/intro-accueil.png" alt="Page d’introduction Paroles de Voie Pro">
    <a class="enter-link" href="projets.html">Entrer</a>
  </main>
</body>
</html>
